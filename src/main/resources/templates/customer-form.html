<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Registration Form</title>

    <style>
        .error {color:red}
    </style>
</head>
<body>

<form th:action="@{/processForm}" th:object="${customer}" method="POST">

    First name: <input type="text" th:field="*{firstName}"></input>
    <br><br>

    Last name:<input type="text" th:field="*{lastName}"></input>

    <!-- displaying the error message if present -->
    <span th:if="${#fields.hasErrors('lastName')}"
           th:errors="*{lastName}"
            class="error"></span>
    <br><br>

    <br><br>

    Free passes:<input type="text" th:field="*{freePasses}"></input>
    <!-- displaying the error message if present -->
    <span th:if="${#fields.hasErrors('freePasses')}"
          th:errors="*{freePasses}"
          class="error"></span>

    <br><br>

    Postal Code:<input type="text" th:field="*{postalCode}"></input>
    <!-- displaying the error message if present -->
    <span th:if="${#fields.hasErrors('postalCode')}"
          th:errors="*{postalCode}"
          class="error"></span>

    <br><br>

    Course Code:<input type="text" th:field="*{courseCode}"></input>
    <!-- displaying the error message if present -->
    <span th:if="${#fields.hasErrors('courseCode')}"
          th:errors="*{courseCode}"
          class="error"></span>

    <br><br>

    <input type="submit" value="Submit"></input>

</form>
</body>
</html>
